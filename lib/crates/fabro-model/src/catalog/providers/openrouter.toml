[models."anthropic/claude-sonnet-4-6".costs]
input_cost_per_mtok = 3.0
output_cost_per_mtok = 15.0
cache_input_cost_per_mtok = 0.3

[models."anthropic/claude-haiku-4-5"]
provider = "openrouter"
api_id = "anthropic/claude-haiku-4.5"
display_name = "Claude Haiku 4.5 (via OpenRouter)"
family = "claude-4"
billing_policy = "anthropic"
small_default = true

[models."anthropic/claude-haiku-4-5".limits]
context_window = 200000
